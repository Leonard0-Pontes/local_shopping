<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Local Shopping</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <div class="navbar">
      <div class="logo">🛍️ Local Shopping</div>
      <div class="nav-links">
        <a href="index.html" class="nav-btn">Home</a>
      </div>
    </div>
    <div class="page">
      <div class="form-card">
        <h2>Login</h2>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="login-email" placeholder="exemplo@email.com">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="login-password" placeholder="******">
        </div>
        <button id="do-login" class="btn btn-primary">Entrar</button>
        <div id="login-error" class="error-msg"></div>
        <p style="margin-top: 1rem; text-align: center;">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
      </div>
    </div>
    <footer>Local Shopping © 2025</footer>
  </div>

  <script src="js/shared/storage.js"></script>
  <script src="js/shared/auth.js"></script>
  <script src="js/pages/login.js"></script>
</body>
</html>
